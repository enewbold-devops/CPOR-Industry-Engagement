<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>CPOR Taxonomy</title>
  <link rel="stylesheet"
    href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css">
  <link rel="stylesheet" href="../css/cpor_styles.css">
</head>
<body>
<div id="cpor-app">

  <!-- ── App Header ───────────────────────────────────────── -->
  <header id="cpor-header" class="cpor-header"></header>

  <!-- ── Main Content ─────────────────────────────────────── -->
  <main id="cpor-main"
        style="padding:0;display:flex;flex-direction:column;height:calc(100vh - 48px);overflow:hidden">

    <!-- Tab pivot bar -->
    <div id="tab-bar" class="cpor-tabs"></div>

    <!-- Filter row (per-tab, rendered dynamically) -->
    <div id="tab-filter-container"></div>

    <!-- Command bar (per-tab) -->
    <div id="tab-command-bar"></div>

    <!-- Tab content panels -->
    <div id="tab-content"
         style="flex:1;overflow-y:auto;background:var(--clr-bg-1)"></div>

    <!-- Pagination -->
    <div id="tab-pagination" style="flex-shrink:0;border-top:1px solid var(--clr-stroke-2)"></div>

  </main>
</div>

<script src="../js/cpor_xrm_client.js"></script>
<script src="../js/cpor_components.js"></script>
<script src="../js/cpor_taxonomy.js"></script>
</body>
</html>
